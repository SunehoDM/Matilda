<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Matilda</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5ede0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Matilda">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f5ede0}
body{font-family:'DM Sans',system-ui,sans-serif;color:#2c2016;min-height:100vh;min-height:100dvh}
:root{
  --bg:#f5ede0;
  --bg2:#ede4d4;
  --sf:#fdf8f2;
  --sf2:#f5ede0;
  --bd:#ddd0be;
  --bd2:#ccc0aa;
  --t:#2c2016;
  --t2:#6b5a44;
  --t3:#a8957c;
  --ac:#b87333;
  --ac2:#d4956a;
  --ac-bg:#fdf0e6;
  --ac-t:#7a3d12;
  --sage:#7a9e7e;
  --sage-bg:#eef4ee;
  --rose:#c4758a;
  --rose-bg:#faeef1;
  --sky:#6b9ab8;
  --sky-bg:#eaf2f8;
  --pg:#8b5e83;
  --pg-bg:#f5eef8;
  --r:12px;
  --font-head:'Lora',Georgia,serif;
}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;min-height:600px}

/* TOPBAR */
.topbar{flex-shrink:0;background:var(--sf);border-bottom:1.5px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:8px;height:54px;z-index:10}
.menu-btn{display:flex;background:none;border:none;color:var(--t2);padding:5px 7px;border-radius:8px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0}
.menu-btn:hover{background:var(--bg2);color:var(--t)}
.logo-wrap{display:flex;flex-direction:column;justify-content:center;margin-right:4px}
.logo{font-family:var(--font-head);font-size:18px;font-weight:600;color:var(--t);letter-spacing:-0.01em;font-style:italic;line-height:1}
.logo-sub{font-size:9px;color:var(--t3);font-style:normal;letter-spacing:0.04em;line-height:1;margin-top:2px}
.nav-center{flex:1;display:flex;align-items:center;justify-content:center;gap:7px}
.nav-btn{background:var(--bg2);border:1px solid var(--bd);color:var(--t2);padding:5px 11px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;display:flex;align-items:center;gap:3px;line-height:1}
.nav-btn:hover{background:var(--bd);color:var(--t)}
.mlabel{font-family:var(--font-head);font-size:14px;font-weight:500;color:var(--t);min-width:160px;text-align:center}
.btn-today{background:var(--ac);border:none;color:#fff;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif}
.view-tabs{display:flex;gap:3px}
.tab{background:var(--bg2);border:1px solid var(--bd);color:var(--t2);padding:5px 11px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif}
.tab:hover{color:var(--t);background:var(--bd)}
.tab.on{background:var(--ac);border-color:var(--ac);color:#fff}
.add-btn{background:var(--ac);border:none;color:#fff;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:4px;white-space:nowrap;font-family:'DM Sans',sans-serif}
.add-btn:hover{background:var(--ac2)}

/* BODY */
.body-row{flex:1;display:flex;min-height:0}
.mob-overlay{display:none;position:fixed;inset:0;top:54px;background:rgba(44,32,22,.3);z-index:49}
.mob-overlay.on{display:block}

/* SIDEBAR */
.sidebar{width:214px;flex-shrink:0;background:var(--sf);border-right:1.5px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;padding:14px 10px;transition:width 0.2s,padding 0.2s}
.sidebar.collapsed{width:0;padding:0;overflow:hidden;border:none}
.slabel{font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;margin:0 4px 5px;font-family:'DM Sans',sans-serif}
.cat-btn{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:8px;border:none;background:none;width:100%;text-align:left;font-size:11.5px;color:var(--t2);cursor:pointer;font-weight:500;font-family:'DM Sans',sans-serif}
.cat-btn:hover{background:var(--bg2);color:var(--t)}
.cat-btn.on{background:var(--ac-bg);color:var(--ac-t)}
.cat-n{margin-left:auto;font-size:10px;color:var(--t3)}
.sdiv{height:1px;background:var(--bd);margin:8px 4px}


/* GLASS WIDGET */
.glass{margin:0 4px;position:relative;overflow:hidden;border-radius:14px;padding:12px 13px;background:rgba(253,248,242,.7);border:1px solid rgba(255,255,255,.9);box-shadow:0 4px 18px rgba(160,130,90,.12),inset 0 1px 0 rgba(255,255,255,.9)}
.glass::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.28) 0%,transparent 55%);border-radius:14px;pointer-events:none}
.gdate{font-size:10px;font-weight:600;color:var(--t2);margin-bottom:7px;letter-spacing:.04em;font-family:var(--font-head);font-style:italic}
.gentry{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:1px solid rgba(180,162,138,.28)}
.gentry:last-child{border:none}
.gdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.gtitle{font-size:11px;color:var(--t);flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gtime{font-size:10px;color:var(--t3)}
.gempty{font-size:11px;color:var(--t3);font-style:italic;padding:2px 0}

/* PG BADGE */
.pg-badge{display:inline-flex;align-items:center;gap:3px;background:var(--pg-bg);color:var(--pg);border:1px solid var(--pg);border-radius:5px;padding:1px 5px;font-size:9px;font-weight:700;letter-spacing:.05em}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.month-wrap{flex:1;overflow-y:auto;padding:10px}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dow-cell{text-align:center;font-size:10px;font-weight:600;color:var(--t3);padding:3px 0;text-transform:uppercase;letter-spacing:.07em}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dcell{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);min-height:82px;padding:5px;cursor:pointer;transition:background .1s,border-color .1s}
.dcell:hover{background:var(--ac-bg);border-color:var(--ac2)}
.dcell.other{background:var(--bg2);opacity:.5}
.dcell.today{background:#fff8f0;border:2px solid var(--ac2)}
.dnum{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:3px;display:block;font-family:var(--font-head)}
.dcell.today .dnum{color:var(--ac-t)}
.dcell.other .dnum{color:var(--t3)}
.pill{border-radius:5px;padding:2px 5px;font-size:10px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:flex;align-items:center;gap:3px}
.pmore{font-size:10px;color:var(--t3);margin-top:1px}
.pill.pg-pill{border:1px solid var(--pg)!important}

/* DAY VIEW */
.dview{flex:1;display:flex;flex-direction:column;overflow:hidden}
.dvhead{background:var(--sf);border-bottom:1.5px solid var(--bd);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.dvtitle{font-size:14px;font-weight:500;color:var(--t);font-family:var(--font-head);font-style:italic}
.back-btn{background:var(--bg2);border:1px solid var(--bd);color:var(--t2);padding:4px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif}
.back-btn:hover{color:var(--t);background:var(--bd)}
.dvscroll{flex:1;overflow-y:auto;padding:0}
.tblock{display:flex;gap:0;min-height:52px;position:relative;cursor:pointer}
.tblock:hover .tblock-bg{background:var(--ac-bg)}
.tblock-bg{position:absolute;inset:0;border-top:1px solid var(--bd);transition:background .1s;z-index:0}
.tlabel{width:52px;flex-shrink:0;padding:6px 10px 0 0;text-align:right;position:relative;z-index:1}
.tlabel-h{font-size:11px;font-weight:600;color:var(--t2);line-height:1}
.tlabel-ap{font-size:9px;color:var(--t3);font-weight:500}
.tevents{flex:1;padding:5px 12px 5px 0;display:flex;flex-direction:column;gap:3px;position:relative;z-index:1;min-height:52px}
.hint{font-size:10px;color:var(--t3);opacity:0;transition:opacity .15s;font-style:italic}
.tblock:hover .hint{opacity:1}
.devt{border-radius:9px;padding:6px 10px;cursor:pointer;display:flex;align-items:flex-start;gap:8px;border-left:3px solid transparent;box-shadow:0 1px 4px rgba(160,130,90,.08)}
.devt:hover{filter:brightness(.97)}
.devt-title{font-size:12px;font-weight:600}
.devt-note{font-size:11px;margin-top:2px;opacity:.7}
.devt-time{font-size:10px;margin-left:auto;white-space:nowrap;padding-top:1px;font-weight:500}
.repeat-tag{font-size:9px;background:rgba(0,0,0,.07);border-radius:4px;padding:1px 5px;margin-left:4px;color:inherit;opacity:.8}

/* TASK VIEW */
.tview{flex:1;overflow-y:auto;padding:14px}
.tgroup{margin-bottom:16px}
.tghead{display:flex;align-items:center;gap:7px;margin-bottom:5px;padding:0 2px}
.tgname{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t2)}
.trow{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;margin-bottom:3px}
.chk{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--bd2);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:#fff}
.chk.done{background:var(--sage);border-color:var(--sage)}
.ttxt{font-size:12px;color:var(--t);flex:1;font-weight:500}
.ttxt.done{text-decoration:line-through;color:var(--t3)}
.tmeta{font-size:10px;color:var(--t3);margin-top:1px}
.delbtn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:0 2px;line-height:1}
.delbtn:hover{color:#c0392b}
.empty-msg{text-align:center;color:var(--t3);padding:36px;font-size:13px;font-family:var(--font-head);font-style:italic}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(180,152,120,.45);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100}
.modal{background:rgba(253,248,242,.97);border:1.5px solid rgba(220,210,195,.9);border-radius:18px;width:100%;max-width:450px;padding:22px;box-shadow:0 12px 48px rgba(100,70,40,.18);max-height:92vh;overflow-y:auto}
.modal h3{font-family:var(--font-head);font-size:17px;font-weight:600;margin-bottom:16px;color:var(--t);font-style:italic}
.f{margin-bottom:11px}
.f label{display:block;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.f input,.f textarea,.f select{width:100%;background:var(--bg2);border:1.5px solid var(--bd);border-radius:9px;padding:7px 10px;color:var(--t);font-size:13px;outline:none;font-family:'DM Sans',sans-serif;font-weight:500}
.f input:focus,.f textarea:focus,.f select:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(184,115,51,.12)}
.f textarea{resize:vertical;min-height:54px}
.t2col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.cpick{padding:6px 3px;border-radius:9px;border:1.5px solid var(--bd);background:var(--bg2);cursor:pointer;font-size:10px;text-align:center;color:var(--t2);line-height:1.4;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'DM Sans',sans-serif}
.cpick:hover{background:var(--ac-bg);color:var(--ac-t);border-color:var(--ac2)}
.cpick.on{background:var(--ac-bg);border-color:var(--ac);color:var(--ac-t)}
.rem-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.rem-btn{background:var(--bg2);border:1.5px solid var(--bd);color:var(--t2);padding:5px 4px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;text-align:center;font-family:'DM Sans',sans-serif}
.rem-btn:hover{background:var(--ac-bg);color:var(--ac-t);border-color:var(--ac2)}
.rem-btn.on{background:var(--ac-bg);border-color:var(--ac);color:var(--ac-t)}
.toggle-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg2);border-radius:9px;border:1.5px solid var(--bd)}
.toggle-row label{font-size:12px;color:var(--t2);font-weight:500;cursor:pointer;flex:1}
.toggle{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;background:var(--bd2);transition:background .2s;flex-shrink:0;padding:0}
.toggle.on{background:var(--pg)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:19px}
.macts{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;align-items:center}
.m-cancel{background:none;border:1.5px solid var(--bd);color:var(--t2);padding:7px 13px;border-radius:9px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif}
.m-cancel:hover{background:var(--bg2)}
.m-save{background:var(--ac);border:none;color:#fff;padding:7px 16px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif}
.m-save:hover{background:var(--ac2)}
.m-del{background:none;border:1.5px solid #e8a8a8;color:#8a2020;padding:7px 13px;border-radius:9px;cursor:pointer;font-size:13px;margin-right:auto;font-family:'DM Sans',sans-serif}
.m-del:hover{background:#fdf0f0}
.toast{position:fixed;bottom:24px;right:20px;background:var(--t);color:#f5ede0;padding:10px 16px;border-radius:12px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;font-weight:500}
.toast.show{opacity:1}
.date-fields{display:flex;align-items:center;gap:4px}
.date-fields input{background:var(--bg2);border:1.5px solid var(--bd);border-radius:9px;padding:7px 0;color:var(--t);font-size:13px;outline:none;font-family:'DM Sans',sans-serif;font-weight:500;text-align:center}
.date-fields input:focus{border-color:var(--ac)}
.df-sep{color:var(--t3);font-weight:700;font-size:14px;flex-shrink:0}
.df-dd{width:42px}
.df-mm{width:42px}
.df-yyyy{width:58px}
.matilda-title{display:flex;align-items:baseline;gap:0px;line-height:1}
.matilda-title span{display:inline-block;transform-origin:center;font-family:'Lora',serif;font-size:19px;font-weight:600;font-style:italic;color:var(--t)}
.matilda-title span:nth-child(1){transform:rotate(-6deg)}
.matilda-title span:nth-child(2){transform:rotate(3deg)}
.matilda-title span:nth-child(3){transform:rotate(-2deg)}
.matilda-title span:nth-child(4){transform:rotate(4deg)}
.matilda-title span:nth-child(5){transform:rotate(-3deg)}
.matilda-title span:nth-child(6){transform:rotate(5deg)}
.matilda-title span:nth-child(7){transform:rotate(-4deg)}

/* MOBILE */
@media(max-width:640px){
  .matilda-title span{font-size:15px}
  .logo-sub{font-size:8px}
  .nav-center{gap:4px}
  .mlabel{min-width:80px;font-size:12px}.app{min-height:100dvh}
  .sidebar{position:fixed;left:0;top:54px;bottom:0;z-index:50;width:240px;box-shadow:4px 0 20px rgba(100,70,40,.15)}
  .sidebar.collapsed{width:0;box-shadow:none}
  .mlabel{min-width:100px;font-size:13px}
  .mob-overlay.on{display:block}
  .add-btn .btn-txt{display:none}
  .view-tabs{gap:2px}
  .tab{padding:5px 8px;font-size:11px}
  .dcell{min-height:52px;padding:3px}
  .dnum{font-size:11px}
  .pill{font-size:9px;padding:1px 4px}
  .mgrid{gap:2px}
  .dow-cell{font-size:9px}
  .month-wrap{padding:6px}
}
@media(max-width:400px){
  .dcell{min-height:40px}
  .pill{display:none}
}

.bottom-nav{display:none}
@media(max-width:640px){
  .view-tabs{display:none}
  .add-btn .btn-txt{display:none}
  .body-row{padding-bottom:60px}
  .sidebar{bottom:60px!important}
  .dcell{min-height:58px;padding:4px}
  .pill{font-size:9px;padding:1px 4px}
  .mgrid{gap:2px}
  .dow-cell{font-size:9px}
  .month-wrap{padding:6px 6px 0}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--sf);border-top:1.5px solid var(--bd);z-index:40;align-items:center;justify-content:space-around;padding:0 8px;box-shadow:0 -2px 16px rgba(100,70,40,.08)}
  .bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 14px;border-radius:10px;border:none;background:none;color:var(--t3);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;flex:1}
  .bn-item.on{color:var(--ac)}
  .bn-add{background:var(--ac);border:none;color:#fff;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(184,115,51,.4);flex-shrink:0}
}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <button class="menu-btn" onclick="toggleSidebar()" id="menu-btn">
    <svg width="18" height="14" fill="none" viewBox="0 0 18 14"><path d="M1 1h16M1 7h16M1 13h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
<div class="logo-wrap">
  <div class="logo matilda-title">
    <span>M</span><span>A</span><span>T</span><span>I</span><span>L</span><span>D</span><span>A</span>
    <svg width="10" height="9" viewBox="0 0 10 9" fill="none" style="margin-left:3px;margin-bottom:-1px;flex-shrink:0"><path d="M5 8.5C5 8.5 0.5 5.5 0.5 3C0.5 1.619 1.619 0.5 3 0.5C3.88 0.5 4.657 0.943 5 1.618C5.343 0.943 6.12 0.5 7 0.5C8.381 0.5 9.5 1.619 9.5 3C9.5 5.5 5 8.5 5 8.5Z" fill="#c4758a"/></svg>
  </div>
  <div class="logo-sub">an organiser for the loml</div>
</div>
  <div class="nav-center">
    <button class="nav-btn" onclick="navMonth(-1)"><svg width="13" height="13" fill="none" viewBox="0 0 13 13"><path d="M8 2L3 6.5 8 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <span class="mlabel" id="mlabel">Loading...</span>
    <button class="nav-btn" onclick="navMonth(1)"><svg width="13" height="13" fill="none" viewBox="0 0 13 13"><path d="M5 2l5 4.5L5 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button class="btn-today" onclick="goToday()">today</button>
  </div>
  <div class="view-tabs">
    <button class="tab on" id="tab-month" onclick="setView('month')">month</button>
    <button class="tab" id="tab-task" onclick="setView('task')">tasks</button>
  </div>
  <button class="add-btn" onclick="openModal()">
    <svg width="12" height="12" fill="none" viewBox="0 0 12 12"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
    <span class="btn-txt">new</span>
  </button>
</div>

<div class="body-row">
  <div class="mob-overlay" id="mob-overlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="slabel">subjects</div>
    <div id="cat-list"></div>
    <div class="sdiv"></div>
    <div class="slabel">life</div>
    <div id="life-list"></div>
    <div class="sdiv"></div>
    <div class="slabel" style="margin-bottom:7px">today</div>
    <div style="font-size:10px;color:var(--t3);text-align:center;padding:2px 0 6px;font-style:italic" id="sync-status">connecting…</div>
        <div style="padding:4px 4px 8px">

const ALL_CATS=[...SUBJECT_CATS,...LIFE_CATS];

let entries=JSON.parse(localStorage.getItem('matilda-v1')||'[]');
let mo=0,view='month',selDay=null,editId=null,selCat='anatomy',filterCat=null;

function persist(){localStorage.setItem('matilda-v1',JSON.stringify(entries));}
function C(id){return ALL_CATS.find(c=>c.id===id)||ALL_CATS[0];}
function fmt(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function tod(){return fmt(new Date());}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600);}

// SVG icons for categories
const ICONS={
  anatomy:`<path d="M8 2a4 4 0 014 4c0 3-4 8-4 8S4 9 4 6a4 4 0 014-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>`,
  psm:`<circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 8h5M8 5.5v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>`,

  ent:`<path d="M8 3c-2 0-3.5 1.5-3.5 3.5 0 1.5.8 2.8 2 3.5v2.5h3v-2.5c1.2-.7 2-2 2-3.5C11.5 4.5 10 3 8 3z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>`,
  optha:`<ellipse cx="8" cy="8" rx="6" ry="4" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/>`,
  paedia:`<circle cx="8" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M4 14c0-2.5 1.8-4 4-4s4 1.5 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>`,
  physio:`<path d="M2 10c2-4 4-6 6-6s4 2 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M5 10v3M8 8v5M11 10v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>`,
  biochem:`<path d="M6 2v4L3 12h10L10 6V2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 2h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>`,
  pharma:`<rect x="3" y="6" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M6 3h4v3H6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M8 8v3M6.5 9.5h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>`,
  microbio:`<circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 3v2M8 11v2M3 8h2M11 8h2M4.5 4.5l1.5 1.5M10 10l1.5 1.5M4.5 11.5L6 10M10 6l1.5-1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>`,
  patho:`<path d="M4 13V5l4-3 4 3v8" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M6 9h4M6 11h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>`,
  medicine:`<path d="M3 6h10v7a1 1 0 01-1 1H4a1 1 0 01-1-1V6z" stroke="currentColor" stroke-width="1.5"/><path d="M3 6l2-3h6l2 3M6 9.5h4M8 7.5v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>`,
  surgery:`<path d="M4 4l8 8M8 4l-4 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="4" r="1.5" stroke="currentColor" stroke-width="1.4"/>`,
  gynae:`<path d="M8 3a3 3 0 100 6 3 3 0 000-6zM8 9v4M6 11h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>`,
  ortho:`<path d="M8 2v12M5 5l3-3 3 3M5 11l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`,
  radio:`<path d="M3 8a5 5 0 0110 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M5 8a3 3 0 016 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="8" r="1" fill="currentColor"/>`,
  psych:`<path d="M8 3c-2.5 0-4 1.5-4 3.5 0 1.5 1 2.8 2.5 3.3L6 13h4l-.5-3.2C11 9.3 12 8 12 6.5 12 4.5 10.5 3 8 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>`,
  anaes:`<path d="M5 8h6M8 5l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4"/>`,
  dermat:`<path d="M8 3C5 3 3 5 3 8c0 2 1 3.5 2.5 4.5L8 14l2.5-1.5C12 11.5 13 10 13 8c0-3-2-5-5-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>`,
  pyq:`<rect x="3" y="2" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M6 5.5h4M6 8h4M6 10.5h2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>`,
  personal:`<circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 14c0-2.5 2-4 5-4s5 1.5 5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>`,

  official:`<path d="M8 2L2 6v8h12V6L8 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><rect x="6" y="9" width="4" height="5" rx="0.5" stroke="currentColor" stroke-width="1.3"/>`,
  commissions:`<path d="M4 12l2-2 6-6-2-2-6 6-2 2 2 2zM10 4l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`,

function SI(id,col,sz){
  sz=sz||11;
  const inner=(ICONS[id]||ICONS.personal).replace(/stroke="currentColor"/g,`stroke="${col}"`).replace(/fill="currentColor"/g,`fill="${col}"`);
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">${inner}</svg>`;
}

function navMonth(d){mo+=d;render();}
function goToday(){mo=0;selDay=tod();render();}

function setView(v){
  view=v;
  document.getElementById('v-month').style.display=v==='month'?'flex':'none';
  document.getElementById('v-day').style.display=v==='day'?'flex':'none';
  document.getElementById('v-task').style.display=v==='task'?'block':'none';
  ['month','task'].forEach(t=>{const b=document.getElementById('tab-'+t);if(b)b.classList.toggle('on',t===v);});
  if(v==='task') renderTasks();
  if(v==='day'&&selDay) renderDay(selDay);
}
function openDay(ds){selDay=ds;setView('day');}
function backToMonth(){setView('month');}
function toggleFilter(id){filterCat=filterCat===id?null:id;render();if(view==='task')renderTasks();}

function toggleSidebar(){
  const s=document.getElementById('sidebar');
  const ov=document.getElementById('mob-overlay');
  const btn=document.querySelector('#menu-btn svg');
  s.classList.toggle('collapsed');
  const collapsed=s.classList.contains('collapsed');
  if(ov) ov.classList.toggle('on',!collapsed);
  if(btn){
    btn.innerHTML=collapsed
      ?'<path d="M1 1h16M1 7h16M1 13h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'
      :'<path d="M2 2l14 14M16 2L2 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>';
  }
  localStorage.setItem('matilda-sidebar',collapsed?'0':'1');
}

function render(){renderSidebar();renderMonth();renderGlass();}

function renderSidebar(){
  document.getElementById('cat-list').innerHTML=SUBJECT_CATS.map(c=>{
    const n=entries.filter(e=>e.cat===c.id).length;
    const on=filterCat===c.id;
    return `<button class="cat-btn${on?' on':''}" onclick="toggleFilter('${c.id}')">
      ${SI(c.id,on?c.tx:c.bd,13)}<span>${c.label}</span><span class="cat-n">${n||''}</span>
    </button>`;
  }).join('');
  document.getElementById('life-list').innerHTML=LIFE_CATS.map(c=>{
    const n=entries.filter(e=>e.cat===c.id).length;
    const on=filterCat===c.id;
    return `<button class="cat-btn${on?' on':''}" onclick="toggleFilter('${c.id}')">
      ${SI(c.id,on?c.tx:c.bd,13)}<span>${c.label}</span><span class="cat-n">${n||''}</span>
    </button>`;
  }).join('');
}


function getMS(off){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+off);d.setHours(0,0,0,0);return d;}

function renderMonth(){
  const ms=getMS(mo);const yr=ms.getFullYear(),mn=ms.getMonth();
  const MNAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('mlabel').textContent=`${MNAMES[mn]} ${yr}`;
  let dow=ms.getDay();dow=dow===0?6:dow-1;
  const dim=new Date(yr,mn+1,0).getDate();
  const dip=new Date(yr,mn,0).getDate();
  const cells=[];
  for(let i=dow-1;i>=0;i--)cells.push({d:new Date(yr,mn-1,dip-i),other:true});
  for(let d=1;d<=dim;d++)cells.push({d:new Date(yr,mn,d),other:false});
  while(cells.length%7!==0)cells.push({d:new Date(yr,mn+1,cells.length-dim-dow+1),other:true});
  document.getElementById('mgrid').innerHTML=cells.map(({d,other})=>{
    const ds=fmt(d);const isT=fmt(d)===tod();
    const de=entries.filter(e=>e.date===ds&&(!filterCat||e.cat===filterCat));
    const show=de.slice(0,3),more=de.length-3;
    return `<div class="dcell${isT?' today':''}${other?' other':''}" onclick="openDay('${ds}')">
      <span class="dnum">${d.getDate()}</span>
      ${(()=>{
        // Group by category - show unique icons only
        const seen={};const icons=[];
        show.forEach(e=>{if(!seen[e.cat]){seen[e.cat]=true;const c=C(e.cat);icons.push(`<span title="${c.label}" style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:${c.bg};border:1px solid ${c.bd};flex-shrink:0" onclick="event.stopPropagation();openDay('${fmt(new Date())}')">${SI(e.cat,c.tx,10)}</span>`)}});
        return `<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:2px">${icons.join('')}${de.length>show.length?`<span style="font-size:9px;color:var(--t3);align-self:center">+${de.length-show.length}</span>`:''}</div>`;
      })()}
      ${more>0?`<div class="pmore">+${more}</div>`:''}
    </div>`;
  }).join('');
}

function renderDay(ds){
  const d=new Date(ds+'T00:00:00');
  const DN=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dvtitle').textContent=`${DN[d.getDay()]}, ${d.getDate()} ${MN[d.getMonth()]} ${d.getFullYear()}`;
  const de=entries.filter(e=>e.date===ds&&(!filterCat||e.cat===filterCat));
  const byH={};
  de.forEach(e=>{const h=e.startTime?parseInt(e.startTime.split(':')[0]):null;const k=h!=null?h:'x';if(!byH[k])byH[k]=[];byH[k].push(e);});
  let html='';
  if(byH.x&&byH.x.length)html+=`<div class="tblock" onclick="openModalAtHour('${ds}',null)"><div class="tblock-bg"></div><div class="tlabel" style="padding-top:8px"><span class="tlabel-h" style="font-size:9px;color:var(--t3)">all<br>day</span></div><div class="tevents">${byH.x.map(evtHtml).join('')}<div class="hint">+ add here</div></div></div>`;
  for(let h=0;h<24;h++){
    const evs=byH[h]||[];
    const disp=h===0?'12':h<=12?String(h):String(h-12);
    const ap=h<12?'am':'pm';
    const isNow=ds===tod()&&new Date().getHours()===h;
    html+=`<div class="tblock" onclick="openModalAtHour('${ds}',${h})">
      <div class="tblock-bg"${isNow?' style="background:rgba(184,115,51,.06)"':''}></div>
      <div class="tlabel"><span class="tlabel-h" style="${isNow?'color:var(--ac)':''}">${disp}</span><span class="tlabel-ap" style="${isNow?'color:var(--ac)':''}">${ap}</span></div>
      <div class="tevents">${evs.map(evtHtml).join('')}${!evs.length?'<div class="hint">+ add here</div>':''}</div>
    </div>`;
  }
  const sc=document.getElementById('dvscroll');sc.innerHTML=html;
  const fh=Object.keys(byH).filter(k=>k!=='x').map(Number).sort((a,b)=>a-b)[0];
  const scrollTo=fh!=null?fh:new Date().getHours();
  setTimeout(()=>{sc.scrollTop=Math.max(0,scrollTo*52-80);},30);
}

function evtHtml(e){
  const c=C(e.cat);
  const repeatTag=e.repeat&&e.repeat!==''?`<span class="repeat-tag">${{daily:'daily',weekly:'weekly',biweekly:'2wk',monthly:'monthly'}[e.repeat]||''}</span>`:'';
  const pgTag=e.forPG?`<span class="pg-badge" style="margin-left:4px">PG</span>`:'';
  return `<div class="devt" style="background:${c.bg};border-left-color:${c.bd}${e.forPG?';outline:1px solid var(--pg)':''}" onclick="event.stopPropagation();editEntry('${e.id}')">
    ${SI(e.cat,c.tx,13)}
    <div style="flex:1">
      <div class="devt-title" style="color:${c.tx}">${e.title}${pgTag}${repeatTag}</div>
      ${e.notes?`<div class="devt-note" style="color:${c.tx}">${e.notes}</div>`:''}
    </div>
    ${e.startTime?`<span class="devt-time" style="color:${c.tx};opacity:.7">${e.startTime}${e.endTime?'–'+e.endTime:''}</span>`:''}
  </div>`;
}

function renderTasks(){
  let html='';
  // PG entries first
  const pgItems=entries.filter(e=>e.forPG&&!e.done&&(!filterCat||e.cat===filterCat));
  if(pgItems.length){
    html+=`<div class="tgroup"><div class="tghead"><svg width="12" height="12" fill="none" viewBox="0 0 12 12"><path d="M2 10l2-2 6-6-2-2-6 6-2 2 2 2z" stroke="var(--pg)" stroke-width="1.5" stroke-linecap="round"/></svg><span class="tgname" style="color:var(--pg)">PG prep (${pgItems.length})</span></div>
    ${pgItems.map(e=>{const c=C(e.cat);return trowHtml(e,c);}).join('')}</div>`;
  }
  ALL_CATS.forEach(c=>{
    const items=entries.filter(e=>e.cat===c.id&&!e.forPG&&!e.done&&(!filterCat||filterCat===c.id));
    if(!items.length)return;
    html+=`<div class="tgroup"><div class="tghead">${SI(c.id,c.bd,12)}<span class="tgname" style="color:${c.tx}">${c.label}</span><span style="font-size:10px;color:var(--t3);margin-left:4px">${items.length}</span></div>
    ${items.map(e=>trowHtml(e,c)).join('')}</div>`;
  });
  document.getElementById('tcontent').innerHTML=html||`<div class="empty-msg">nothing yet — add entries with the + button</div>`;
}

function trowHtml(e,c){
  const repeatLabel=e.repeat&&e.repeat!==''?` · ${e.repeat}`:'';
  return `<div class="trow">
    <div class="chk${e.done?' done':''}" onclick="toggleDone('${e.id}')">${e.done?`<svg width="9" height="9" fill="none" viewBox="0 0 9 9"><path d="M1.5 4.5l2 2 4-4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}</div>
    <div style="flex:1">
      <div class="ttxt${e.done?' done':''}" style="color:${c.tx}">${e.title}${e.forPG?` <span class="pg-badge">PG</span>`:''}</div>
      <div class="tmeta">${e.date.split('-').reverse().join('/')}${e.startTime?' · '+e.startTime:''}${repeatLabel}</div>
    </div>
    <button class="delbtn" onclick="delById('${e.id}')">×</button>
  </div>`;
}

function renderGlass(){
  const t=new Date();
  const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('gdate').textContent=`${DN[t.getDay()]} ${t.getDate()} ${MN[t.getMonth()]}`;
  const te=entries.filter(e=>e.date===tod()).sort((a,b)=>(a.startTime||'99').localeCompare(b.startTime||'99')).slice(0,6);
  document.getElementById('gentries').innerHTML=te.length
    ?te.map(e=>{const c=C(e.cat);return `<div class="gentry"><span class="gdot" style="background:${c.bd}"></span><span class="gtitle">${e.title}</span><span class="gtime">${e.startTime||''}</span></div>`;}).join('')
    :`<div class="gempty">clear today ✦</div>`;
}

function toggleDone(id){const e=entries.find(x=>x.id===id);if(e){e.done=!e.done;persist();apiToggleDone(id);render();if(view==='task')renderTasks();if(view==='day')renderDay(selDay);}}
function delById(id){entries=entries.filter(e=>e.id!==id);persist();apiDeleteEntry(id);render();if(view==='task')renderTasks();}

function syncDate(){
  const dd=document.getElementById('fd-dd').value;
  const mm=document.getElementById('fd-mm').value;
  const yyyy=document.getElementById('fd-yyyy').value;
  if(dd&&mm&&yyyy&&yyyy.length===4){
    document.getElementById('fd').value=`${yyyy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
  }
}
function setDateFields(iso){
  if(!iso){const t=new Date();document.getElementById('fd-dd').value=t.getDate();document.getElementById('fd-mm').value=t.getMonth()+1;document.getElementById('fd-yyyy').value=t.getFullYear();document.getElementById('fd').value=fmt(t);return;}
  const[y,m,d]=iso.split('-');
  document.getElementById('fd-dd').value=parseInt(d);
  document.getElementById('fd-mm').value=parseInt(m);
  document.getElementById('fd-yyyy').value=y;
  document.getElementById('fd').value=iso;
}

function selRem(v){
  selRemMin=selRemMin===v?null:v;
  document.querySelectorAll('.rem-btn').forEach(b=>b.classList.toggle('on',selRemMin!==null&&parseInt(b.dataset.v)===selRemMin));
  const n=document.getElementById('rnote');
  n.textContent=selRemMin===null?'no reminder set':selRemMin===0?'popup at event time':`popup ${selRemMin} min before`;
}
function resetRem(val){
  selRemMin=val!=null?val:null;
  document.querySelectorAll('.rem-btn').forEach(b=>b.classList.toggle('on',selRemMin!==null&&parseInt(b.dataset.v)===selRemMin));
  const n=document.getElementById('rnote');
  n.textContent=selRemMin===null?'no reminder set':selRemMin===0?'popup at event time':`popup ${selRemMin} min before`;
}
function togglePG(){
  pgMode=!pgMode;
  const btn=document.getElementById('pg-toggle');
  btn.classList.toggle('on',pgMode);
}
function resetPG(val){
  pgMode=!!val;
  document.getElementById('pg-toggle').classList.toggle('on',pgMode);
}

function openModal(date){
  editId=null;
  document.getElementById('mtitle').textContent='new entry';
  document.getElementById('ft').value='';
  setDateFields(date||selDay||tod());
  document.getElementById('fs').value='';document.getElementById('fe').value='';document.getElementById('fn').value='';
  document.getElementById('frepeat').value='';
  document.getElementById('mdel').style.display='none';
  resetRem(null);resetPG(false);
  buildCP();selCat=selCat||'anatomy';hlCP();
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('ft').focus(),40);
}
function openModalDay(){openModal(selDay);}
function openModalAtHour(ds,h){
  openModal(ds);

    const hh=String(h).padStart(2,'0');

function editEntry(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  editId=id;
  document.getElementById('mtitle').textContent='edit entry';
  document.getElementById('ft').value=e.title;
  setDateFields(e.date);
  document.getElementById('fs').value=e.startTime||'';
  document.getElementById('fe').value=e.endTime||'';
  document.getElementById('fn').value=e.notes||'';
  document.getElementById('frepeat').value=e.repeat||'';
  document.getElementById('mdel').style.display='block';
  resetRem(e.reminderMin!=null?e.reminderMin:null);
  resetPG(e.forPG);
  buildCP();selCat=e.cat;hlCP();
  document.getElementById('modal').style.display='flex';
}

function buildCP(){
  document.getElementById('cpicker').innerHTML=ALL_CATS.map(c=>
    `<button class="cpick" id="cp-${c.id}" onclick="pickCat('${c.id}')">${SI(c.id,c.bd,15)}<span style="font-size:9px;color:var(--t2)">${c.label}</span></button>`
  ).join('');
}
function pickCat(id){selCat=id;hlCP();}
function hlCP(){
  document.querySelectorAll('.cpick').forEach(b=>b.classList.remove('on'));
  const b=document.getElementById('cp-'+selCat);
  if(b){b.classList.add('on');const c=C(selCat);b.querySelector('span').style.color=c.tx;b.querySelectorAll('path,rect,circle,ellipse').forEach(p=>p.setAttribute('stroke',c.tx));}
}
function closeModal(){document.getElementById('modal').style.display='none';}

function expandRepeat(e){
  // Generate repeated entries for the next 6 months
  if(!e.repeat||e.repeat==='') return [];
  const base=new Date(e.date+'T00:00:00');
  const extras=[];
  const limit=new Date();limit.setMonth(limit.getMonth()+6);
  let cur=new Date(base);
  for(let i=0;i<60;i++){
    if(e.repeat==='daily') cur.setDate(cur.getDate()+1);
    else if(e.repeat==='weekly') cur.setDate(cur.getDate()+7);
    else if(e.repeat==='biweekly') cur.setDate(cur.getDate()+14);
    else if(e.repeat==='monthly') cur.setMonth(cur.getMonth()+1);
    if(cur>limit) break;
    extras.push({...e,id:e.id+'_r'+i,date:fmt(cur),_isRepeat:true,_parentId:e.id});
  }
  return extras;
}

function saveEntry(){
  const title=document.getElementById('ft').value.trim();if(!title)return;
  const repeat=document.getElementById('frepeat').value;
  const e={
    id:editId||(Date.now().toString(36)+Math.random().toString(36).slice(2,6)),
    title,cat:selCat,
    date:document.getElementById('fd').value,
    startTime:document.getElementById('fs').value||'',
    endTime:document.getElementById('fe').value||'',
    notes:document.getElementById('fn').value,
    repeat,forPG:pgMode,
    reminderMin:selRemMin,
    done:false
  };
  if(editId){
    // Remove old repeated entries for this parent
    entries=entries.filter(x=>x._parentId!==editId);
    const i=entries.findIndex(x=>x.id===editId);
    if(i>-1){e.done=entries[i].done;e.gcalId=entries[i].gcalId;entries[i]=e;}
  } else {
    entries.unshift(e);
  }
  // Add repeated entries
  const repeats=expandRepeat(e);
  entries=entries.filter(x=>!x._isRepeat||x._parentId!==e.id);
  entries.push(...repeats);
  persist();closeModal();render();
  if(view==='day') renderDay(selDay);
  if(view==='task') renderTasks();
  apiSaveEntry(e);
  repeats.forEach(r=>apiSaveEntry(r));
}
function delEntry(){
  if(editId){
    entries=entries.filter(e=>e.id!==editId&&e._parentId!==editId);
    persist();closeModal();render();if(view==='task')renderTasks();
  }
}

// ── API SYNC ─────────────────────────────────────────────────────
// Replace this URL after deploying to Vercel
const API_URL = 'https://matilda-backend.vercel.app/api/sync';

let syncOnline = false;

async function apiGet(){
  try{
    const r = await fetch(API_URL, {method:'GET'});
    if(!r.ok) return null;
    const d = await r.json();
    return d.entries || null;
  }catch{return null;}
}

async function apiPost(body){
  try{
    await fetch(API_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  }catch{}
}

async function initSync(){
  // Try to load from API first
  const remote = await apiGet();
  if(remote !== null){
    syncOnline = true;
    if(remote.length > 0){
      // Merge: remote wins, but keep local done states
      const localDone = {};
      entries.forEach(e => { if(e.done) localDone[e.id] = true; });
      entries = remote.map(e => ({...e, done: localDone[e.id] || e.done}));
      localStorage.setItem('matilda-v1', JSON.stringify(entries));
    } else if(entries.length > 0){
      // Push local to remote on first connect
      await apiPost({action:'save_all', entries});
    }
    render();
    showSyncStatus('synced ✦');
  } else {
    showSyncStatus('offline — local only');
  }
}

function showSyncStatus(msg){
  const el = document.getElementById('sync-status');
  if(el){ el.textContent = msg; }
}

async function apiSaveEntry(e){
  if(syncOnline) await apiPost({action:'upsert', entry:e});
}
async function apiDeleteEntry(id){
  if(syncOnline) await apiPost({action:'delete', id});
}
async function apiToggleDone(id){
  if(syncOnline) await apiPost({action:'toggle_done', id});
}

// ── LOCAL NOTIFICATIONS ──────────────────────────────────────
async function requestNotifPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission==='granted') return true;
  if(Notification.permission==='denied') return false;
  const p = await Notification.requestPermission();
  return p==='granted';
}

function scheduleNotifications(){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  // Clear any existing scheduled notifs stored in localStorage
  const scheduled = JSON.parse(localStorage.getItem('matilda-notif-scheduled')||'{}');
  const now = new Date();
  const todayStr = fmt(now);
  const tomorrowStr = fmt(new Date(now.getTime()+86400000));

  // Schedule for today and tomorrow
  [todayStr, tomorrowStr].forEach(dateStr=>{
    const dayEntries = entries.filter(e=>e.date===dateStr&&e.startTime&&!e.done);
    dayEntries.forEach(e=>{
      const key = e.id+'_'+dateStr;
      if(scheduled[key]) return; // already scheduled
      const [hh,mm] = e.startTime.split(':').map(Number);
      const eventTime = new Date(dateStr+'T'+e.startTime+':00');
      const reminderMins = e.reminderMin!=null ? e.reminderMin : 10;
      const notifTime = new Date(eventTime.getTime() - reminderMins*60000);
      const delay = notifTime.getTime() - now.getTime();
      if(delay < 0) return; // already past
      if(delay > 48*3600000) return; // too far ahead
      const c = C(e.cat);
      setTimeout(()=>{
        if(Notification.permission==='granted'){
          new Notification('Matilda — '+c.label, {
            body: e.title + (e.startTime ? ' at '+e.startTime : ''),
            icon: '/Matilda/icon-192.png',
            badge: '/Matilda/icon-192.png',
            tag: e.id,
            requireInteraction: false,
          });
        }
      }, Math.max(delay, 0));
      scheduled[key] = notifTime.toISOString();
    });
  });
  localStorage.setItem('matilda-notif-scheduled', JSON.stringify(scheduled));
}

async function initNotifications(){
  const granted = await requestNotifPermission();
  if(granted) scheduleNotifications();
}
// ─────────────────────────────────────────────────────────────

initNotifications();
